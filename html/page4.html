<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn thanh toán</title>
    <link rel="stylesheet" href="../css/style4.CSS">
</head>
<body>
    <h2>Hóa đơn thanh toán</h2>
    <table border="1">
        <tr> 
            <th>STT</th>
            <th>Tên Sản Phẩm</th>
            <th>Số Lượng</th>
            <th>Đơn Giá</th>
            <th>Thành Tiền</th>
        </tr>
        <tr> 
            <td>1</td>
            <td>A</td>
            <td class="sl">3</td>
            <td class="dg">1000</td>
            <td class="tt"></td>
        </tr>
        <tr> 
            <td>2</td>
            <td>B</td>
            <td class="sl">2</td>
            <td class="dg">2000</td>
            <td class="tt"></td>
        </tr>
        <tr> 
            <td>3</td>
            <td>C</td>
            <td class="sl">4</td>
            <td class="dg">3000</td>
            <td class="tt"></td>
        </tr>
        <tr>
            <th colspan="3">Tổng Thanh Toán</th>
            <td colspan="2" id="tongthanhtoan"> </td>
        </tr>
    </table>

    <script>
        const dongia=document.getElementsByClassName("dg");
        const soluong=document.getElementsByClassName("sl");
        const thanhtien=document.getElementsByClassName("tt");
        let tongthanhtoan=0;
        
        for(let i=0; i<dongia.length; i++)
        {   
            thanhtien[i].innerHTML=dongia[i].innerHTML*soluong[i].innerHTML;
            tongthanhtoan += parseInt(thanhtien[i].innerHTML);
        }
        document.getElementById("tongthanhtoan").innerHTML=tongthanhtoan;
    </script>
</body>
</html>
