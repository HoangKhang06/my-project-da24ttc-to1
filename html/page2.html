<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset = "utf-8">	
		<title>Thiết kế form</title>
		<link rel="stylesheet" href="../css/style2.CSS">
	</head>
	<body>
		<div class= "container">
			<form id = "frmLogin">
				<h3 class = "title"> ĐĂNG NHẬP HỆ THỐNG</h3>
				<div class = "form-group">
					<label for = "txtusername"> Tên đăng nhập: </label>
					<input class = "form_control" type ="text" id = "txtusername" placeholder="Nhập tài khoản">
				</div>
				<div class = "form-group">
					<label for = "txtpassword"> Mật khẩu: </label>
					<input class = "form_control" type ="password" id = "txtpassword" placeholder="Nhập mật khẩu">
				</div>
				<input class="button" type="submit" name = "sblogin" value="Đăng Nhập">
				<input class="button" type="reset" name = "rslabel" value="Hủy Bỏ">
			</form>
		</div>
	</body>
</html>
