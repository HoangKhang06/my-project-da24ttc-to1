<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form đăng ký</title>
    <link rel="stylesheet" href="../css/style3.CSS">
</head>
<body>
    <div class="container">
        <h1>Đăng ký thông tin</h1>

        <form>

            <label>Họ tên:</label>
            <input type="text">

            <label>MSSV:</label>
            <input type="text">

            <label>Lớp:</label>
            <select>
                <option>DA24TTA</option>
                <option>DA24TTB</option>
                <option>DA24TTC</option>
                <option>DA24TTD</option>
            </select>

            <label>Giới tính:</label>
            <div class="inline">
                <label class="radio">
                    <input type="radio" name="gt"> Nam
                </label>
                <label class="radio">
                    <input type="radio" name="gt"> Nữ
                </label>
            </div>

            <label>Ngày sinh:</label>
            <input type="date">

            <label>Điểm mạnh:</label>
            <div class="inline">
                <input type="checkbox"> Chăm chỉ
                <input type="checkbox"> Nhanh nhẹn
                <input type="checkbox"> Siêng năng
            </div>

            <label>Hình ảnh:</label>
            <input type="file">

            <label>Email:</label>
            <input type="email">

            <label>SĐT:</label>
            <input type="text">

            <label>Địa chỉ:</label>
            <input type="text">

            <input class="button" type="submit" name="sbsignup" value="Đăng Ký">
            <input class="button" type="reset" name="rslabel" value="Nhập Lại">

        </form>
    </div>
</body>
</html>
